# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - IntexBackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore .NET dependencies
        run: dotnet restore
        working-directory: backend/WebApplication1/WebApplication1

      - name: Check for vulnerable .NET packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt && grep -q "has no vulnerable packages" vuln-report.txt
        working-directory: backend/WebApplication1/WebApplication1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/intex

      - name: Audit frontend npm packages
        run: npm audit --audit-level=moderate
        working-directory: frontend/intex

  build:
    name: Build
    runs-on: windows-latest
    needs: security-scan
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release
        working-directory: backend/WebApplication1/WebApplication1

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"
        working-directory: backend/WebApplication1/WebApplication1

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    name: Deploy
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_794E0BDA511247C4B7E1C51D9F16DA47 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EE9D6358DEDE4BFA8470E2E87ADA9148 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D97905AEBE044E649B81F5849164C947 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IntexBackend'
          slot-name: 'Production'
          package: .
